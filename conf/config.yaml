# conf/config.yaml
data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  competition_name: "titanic"

model:
  name: "xgb-cat"
  save_path: "models"

# conf/config.yaml
hyperparams:
  max_evals: 5
  xgb:
    n_estimators: [100, 200, 500]
    learning_rate: [0.01, 0.05, 0.1]
    max_depth: [3, 5, 7, 10]
    subsample: [0.8, 1.0]
  cat:
    depth: [4, 6, 8, 10]
    learning_rate: [0.01, 0.05, 0.1]
    iterations: [500, 1000]
    l2_leaf_reg: [1, 3, 5]